<!-- <div class="col-12 col-sm-6 col-md-4 col-lg-3 d-flex">  Responsive: Mobile → 1 column per row, Tablet → 2, Medium → 3, Desktop → 4+ -->
<div class="board-column d-flex">
    <div class="board-wrapper d-flex flex-column flex-fill">

        <div class="board-header {{ status_value|slugify }}">
            <i class="fas {{ icon }} me-2"></i>{{ title }}
        </div>

        <div class="board-body flex-grow-1 overflow-auto" data-status="{{ status_value }}">
            {% for app in apps %}
                <div class="job-card" data-job-id="{{ app.id }}" data-status="{{ app.status }}" onclick="openEditModal('{{ app.id }}')">
                    <button class="job-delete-btn" onclick="deleteJob(event, '{{ app.id }}')">
                        <i class="fas fa-times"></i>
                    </button>
                    <div class="job-company">{{ app.company.name }}</div>
                    <div class="job-title">{{ app.job_title }}</div>
                    <br>
                    <div class="job-other-info">
                        <span><i class="fas fa-map-marker-alt"></i> {{ app.company.location }}</span>
                        <span><i class="fas fa-calendar-alt"></i> {{ app.date_applied }}</span>
                        <span><i class="fas fa-pound-sign"></i> {{ app.salary_range }}</span>
                    </div>
                    <!-- <div class="job-date">Applied: {{ app.date_applied }}</div> -->
                </div>
            {% empty %}
                <div class="empty-state">
                    No applications
                </div>
            {% endfor %}
        </div>

        <div class="board-footer"
             data-bs-toggle="modal"
             data-bs-target="#addJobModal"
             data-status="{{ status_value }}">
            + Add Application
        </div>

    </div>
</div>
