{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Cancelled - Trackwise</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'images/favicon.svg' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style-auth.css' %}">
    <link rel="stylesheet" href="{% static 'css/payment.css' %}">
</head>
<body>
    <div class="payment-page min-vh-100 d-flex flex-column align-items-center justify-content-center p-4">

        <a href="{% url 'landing' %}" class="d-flex align-items-center gap-2 text-decoration-none mb-4">
            <div class="logo-icon payment-logo-icon">T</div>
            <span class="payment-brand-name">Trackwise</span>
        </a>

        <div class="result-card">
            <div class="result-icon cancel">
                <i class="fas fa-times"></i>
            </div>

            <h1 class="result-title">Payment cancelled</h1>
            <p class="result-subtitle">
                No worries — you haven't been charged. You can upgrade to Premium any time to unlock all features.
            </p>

            <div class="d-flex flex-column flex-sm-row gap-3 justify-content-center">
                <a href="{% url 'subscribe' %}" class="btn-teal justify-content-center">
                    <i class="fas fa-crown"></i>
                    Try again
                </a>
                <a href="{% url 'home' %}" class="btn-ghost justify-content-center">
                    <i class="fas fa-home"></i>
                    Back to Home
                </a>
            </div>
        </div>

        <p class="payment-note mt-4 text-muted">
            Questions? <a href="mailto:support@trackwise.app" class="payment-support-link">Contact support</a>
        </p>

    </div>
</body>
</html>
