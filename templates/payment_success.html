{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - Trackwise</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'images/favicon.svg' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style-auth.css' %}">
    <link rel="stylesheet" href="{% static 'css/payment.css' %}">
</head>
<body>
    <div class="payment-page min-vh-100 d-flex flex-column align-items-center justify-content-center p-4">

        <a href="{% url 'landing' %}" class="d-flex align-items-center gap-2 text-decoration-none mb-4">
            <div class="logo-icon payment-logo-icon">T</div>
            <span class="payment-brand-name">Trackwise</span>
        </a>

        <div class="result-card">
            <div class="result-icon success">
                <i class="fas fa-check"></i>
            </div>

            <div class="premium-badge">
                <i class="fas fa-crown" style="font-size:0.75rem;"></i>
                Premium Active
            </div>

            <h1 class="result-title">You're all set!</h1>
            <p class="result-subtitle">
                Welcome to Trackwise Premium. Your subscription is now active and all premium features have been unlocked.
            </p>

            <div class="d-flex justify-content-center">
                <a href="{% url 'home' %}" class="btn-teal d-flex align-items-center justify-content-center gap-2">
                    <i class="fas fa-home"></i>
                    Go to Dashboard
                </a>
            </div>
        </div>

        <p class="payment-note mt-4 text-muted">
            A confirmation has been sent to your email.
        </p>

    </div>
</body>
</html>
