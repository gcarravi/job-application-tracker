{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - Trackwise</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'images/favicon.svg' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style-auth.css' %}">
    <style>
        .result-card {
            background: white;
            border-radius: 1rem;
            padding: 3rem 2.5rem;
            max-width: 460px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .result-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #f0fdfa;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
            color: #0d9488;
        }
        .result-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 0.75rem;
        }
        .result-subtitle {
            font-size: 0.9375rem;
            color: #6b7280;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .btn-teal {
            background-color: #0d9488;
            color: white;
            border: none;
            padding: 0.625rem 1.5rem;
            border-radius: 0.5rem;
            font-size: 0.9375rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: background-color 0.2s;
        }
        .btn-teal:hover {
            background-color: #0f766e;
            color: white;
        }
        .premium-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            background: #f0fdfa;
            color: #0d9488;
            font-size: 0.8125rem;
            font-weight: 600;
            padding: 0.375rem 0.875rem;
            border-radius: 2rem;
            margin-bottom: 1.75rem;
            border: 1px solid #ccfbf1;
        }
    </style>
</head>
<body>
    <div class="min-vh-100 d-flex flex-column align-items-center justify-content-center p-4" style="background: #f9fafb;">

        <a href="{% url 'landing' %}" class="d-flex align-items-center gap-2 text-decoration-none mb-4">
            <div class="logo-icon" style="width:36px;height:36px;font-size:1rem;color:white;">T</div>
            <span style="font-size: 1.125rem; font-weight: 700; color: #111827;">Trackwise</span>
        </a>

        <div class="result-card">
            <div class="result-icon">
                <i class="fas fa-check"></i>
            </div>

            <div class="premium-badge">
                <i class="fas fa-crown" style="font-size:0.75rem;"></i>
                Premium Active
            </div>

            <h1 class="result-title">You're all set!</h1>
            <p class="result-subtitle">
                Welcome to Trackwise Premium. Your subscription is now active and all premium features have been unlocked.
            </p>

            <div class="d-flex justify-content-center">
                <a href="{% url 'home' %}" class="btn-teal d-flex align-items-center justify-content-center gap-2">
                    <i class="fas fa-home"></i>
                    Go to Dashboard
                </a>
            </div>
        </div>

        <p class="mt-4 text-muted" style="font-size: 0.8125rem;">
            A confirmation has been sent to your email.
        </p>

    </div>
</body>
</html>
